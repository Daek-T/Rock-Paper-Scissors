<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0f14">
<title>가위바위보 — QA Proto</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --bg:       #0d0f14;
  --surface:  #13161e;
  --surface2: #1a1e2a;
  --border:   #1e2330;
  --accent:   #c8a96e;
  --text:     #d4cfc8;
  --muted:    #9098a8;
  --c: #6eb5c8; --b: #6ec87a; --a: #c8a96e; --s: #e87070;
  --win: #6ec87a; --lose: #e87070; --draw: #c8a96e;
  --sc: #e8c55a; --rk: #6eb5c8; --pp: #c87ab4;

  /* 반응형 폰트 토큰 */
  --f-xs:   clamp(10px, 2.2vw, 11px);
  --f-sm:   clamp(11px, 2.6vw, 13px);
  --f-md:   clamp(13px, 3.2vw, 15px);
  --f-lg:   clamp(15px, 4vw,   18px);
  --f-xl:   clamp(22px, 6vw,   34px);
  --f-xxl:  clamp(28px, 8vw,   44px);
  --f-emoji-sm: clamp(20px, 5vw, 26px);
  --f-emoji-md: clamp(28px, 7vw, 36px);
  --f-emoji-lg: clamp(48px, 12vw, 72px);

  /* 간격 토큰 */
  --sp-xs: clamp(4px,  1vw,  6px);
  --sp-sm: clamp(8px,  2vw,  12px);
  --sp-md: clamp(12px, 3vw,  18px);
  --sp-lg: clamp(16px, 4vw,  24px);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #0d0f14; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: var(--f-sm);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.screen { width: 100%; max-width: 640px; padding: var(--sp-md) var(--sp-sm) 60px; }
.mono { font-family: 'JetBrains Mono', monospace; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: clamp(9px,2.2vw,11px) clamp(16px,4vw,22px);
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); color: var(--text);
  font-family: 'Noto Sans KR', sans-serif; font-size: var(--f-md); font-weight: 700;
  cursor: pointer; transition: all .15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #0d0f14; border-color: var(--accent); }
.btn.primary:hover { background: #d4b87a; }

/* ── PAGE NAV ── */
.page-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: var(--sp-sm); margin-bottom: var(--sp-sm);
  border-bottom: 1px solid var(--border);
}
.nav-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: var(--f-xs); letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
}
.series-badge { font-family: 'JetBrains Mono', monospace; font-size: var(--f-sm); }
.sb-win  { color: var(--win); font-weight: 700; }
.sb-lose { color: var(--lose); }

/* ════════════════════════════════════════
   START SCREEN
════════════════════════════════════════ */
#screen-start {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; text-align: center; gap: 0;
}
.start-emoji { font-size: var(--f-emoji-lg); margin-bottom: var(--sp-sm); }
.start-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: var(--f-xs); letter-spacing: 3px; color: var(--accent); margin-bottom: 8px;
}
.start-title { font-size: var(--f-xxl); font-weight: 900; color: #fff; margin-bottom: var(--sp-lg); }
.diff-list { display: flex; flex-direction: column; gap: var(--sp-xs); width: 100%; max-width: 320px; }
.diff-btn {
  padding: clamp(12px,3vw,16px) clamp(14px,3.5vw,20px);
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); cursor: pointer; text-align: left; transition: border-color .15s;
}
.diff-btn:hover { border-color: var(--accent); }
.diff-btn.easy   { border-left: 3px solid var(--b); }
.diff-btn.normal { border-left: 3px solid var(--a); }
.diff-btn.hard   { border-left: 3px solid var(--s); }
.diff-name { font-size: var(--f-md); font-weight: 700; color: #fff; margin-bottom: 3px; }
.diff-desc { font-size: var(--f-xs); color: #a8b0be; }

/* ════════════════════════════════════════
   CHARACTER SELECT
════════════════════════════════════════ */
.grade-section { margin-bottom: var(--sp-md); }
.grade-header { display: flex; align-items: center; gap: var(--sp-xs); margin-bottom: var(--sp-xs); }
.grade-tag { font-family: 'JetBrains Mono', monospace; font-size: var(--f-lg); font-weight: 700; width: 28px; }
.grade-meta { font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs); color: var(--muted); }

.char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(6px,1.5vw,8px); }
.char-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: clamp(8px,2vw,12px) clamp(6px,1.5vw,10px); cursor: pointer; transition: all .15s;
}
.char-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.cc-emoji { font-size: var(--f-emoji-sm); margin-bottom: 4px; }
.cc-name  { font-size: var(--f-sm); font-weight: 700; color: #fff; margin-bottom: 2px; }
.cc-sub   { font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs); color: var(--muted); margin-bottom: 6px; }
.mini-stat { margin: 3px 0; }
.ms-label {
  display: flex; justify-content: space-between;
  font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs); color: var(--muted); margin-bottom: 2px;
}
.ms-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.ms-fill { height: 100%; border-radius: 2px; }
.sc-bar { background: var(--sc); } .rk-bar { background: var(--rk); } .pp-bar { background: var(--pp); }

/* ════════════════════════════════════════
   PREVIEW
════════════════════════════════════════ */
.preview-vs {
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: var(--sp-sm); align-items: center; margin: var(--sp-md) 0;
}
.prev-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: clamp(12px,3vw,18px) clamp(8px,2vw,12px); text-align: center;
}
.prev-card.me { border-color: var(--accent); }
.prev-emoji  { font-size: var(--f-emoji-md); margin-bottom: 6px; }
.prev-grade  { font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs); margin-bottom: 2px; }
.prev-name   { font-size: var(--f-md); font-weight: 700; color: #fff; margin-bottom: 2px; }
.prev-hp     { font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs); color: var(--muted); margin-bottom: var(--sp-sm); }
.prev-stats  { display: flex; flex-direction: column; gap: 4px; }
.prev-stat   { font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs); color: var(--muted); }
.vs-badge    { font-family: 'JetBrains Mono', monospace; font-size: clamp(16px,4vw,22px); font-weight: 700; color: var(--border); }
.preview-footer { text-align: center; margin-top: var(--sp-sm); }

/* ════════════════════════════════════════
   BATTLE
════════════════════════════════════════ */
.battle-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-sm); }
.turn-pill {
  font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px clamp(10px,2.5vw,14px);
}

.fighters { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(6px,1.5vw,10px); margin-bottom: var(--sp-sm); }
.fighter {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: clamp(8px,2vw,12px);
}
.fighter.me { border-color: #252a38; }
.ft-head { display: flex; align-items: center; gap: clamp(4px,1.2vw,8px); margin-bottom: var(--sp-xs); }
.ft-emoji { font-size: clamp(18px,4.5vw,24px); }
.ft-name  { font-size: var(--f-sm); font-weight: 700; line-height: 1.2; }
.ft-grade { font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs); }

.hp-row { margin-bottom: 4px; }
.hp-label-row {
  display: flex; justify-content: space-between;
  font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs); color: var(--muted); margin-bottom: 4px;
}
.hp-bar { height: clamp(6px,1.5vw,9px); background: var(--border); border-radius: 5px; overflow: hidden; }
.hp-fill { height: 100%; border-radius: 5px; transition: width .4s ease; background: var(--win); }
.hp-fill.med { background: var(--draw); }
.hp-fill.low { background: var(--lose); }

.ft-chips { display: flex; gap: clamp(4px,1vw,6px); margin-top: var(--sp-xs); flex-wrap: wrap; }
.chip {
  font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs);
  padding: 2px clamp(3px,1vw,5px); border-radius: 3px; background: var(--surface2);
}
.chip.sc { color: var(--sc); } .chip.rk { color: var(--rk); } .chip.pp { color: var(--pp); }

/* last result */
.last-result {
  text-align: center; min-height: clamp(32px,8vw,44px);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: var(--sp-sm);
}
.result-msg {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(11px, 3vw, 14px);
  font-weight: 700;
  word-break: keep-all;
  line-height: 1.4;
}
.result-msg.win  { color: var(--win); }
.result-msg.lose { color: var(--lose); }
.result-msg.draw { color: var(--draw); }
.result-msg.idle { color: var(--muted); font-weight: 400; }

/* RPS buttons */
.rps-row { display: grid; grid-template-columns: repeat(3,1fr); gap: clamp(5px,1.5vw,8px); margin-bottom: var(--sp-sm); }
.rps-btn {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: clamp(8px,2.5vw,14px) 4px; cursor: pointer; text-align: center; transition: all .15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.rps-btn:hover:not(:disabled) { transform: translateY(-3px); }
.rps-btn.sc:hover:not(:disabled) { border-color: var(--sc); }
.rps-btn.rk:hover:not(:disabled) { border-color: var(--rk); }
.rps-btn.pp:hover:not(:disabled) { border-color: var(--pp); }
.rps-btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
.rps-icon  { font-size: clamp(24px,6.5vw,32px); display: block; margin-bottom: 3px; }
.rps-label { font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs); color: var(--muted); display: block; margin-bottom: 3px; }
.rps-atk   { font-family: 'JetBrains Mono', monospace; font-size: clamp(12px,3vw,15px); font-weight: 700; display: block; }
.rps-btn.sc .rps-atk { color: var(--sc); }
.rps-btn.rk .rps-atk { color: var(--rk); }
.rps-btn.pp .rps-atk { color: var(--pp); }

/* battle log */
.log-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: clamp(8px,2vw,12px); max-height: clamp(110px,28vw,148px); overflow-y: auto;
}
.log-head {
  font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs);
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
}
.log-row {
  font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs);
  padding: 4px 0; border-bottom: 1px solid var(--border); color: var(--muted);
  word-break: keep-all;
}
.log-row:last-child { border-bottom: none; }
.log-win { color: var(--win); } .log-lose { color: var(--lose); } .log-draw { color: var(--draw); }

/* ════════════════════════════════════════
   END SCREENS
════════════════════════════════════════ */
.end-wrap {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; text-align: center; gap: var(--sp-sm);
  padding: var(--sp-md);
}
.end-icon  { font-size: var(--f-emoji-lg); }
.end-label {
  font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs);
  letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
}
.end-title { font-size: var(--f-xl); font-weight: 900; }
.end-title.win  { color: var(--win); }
.end-title.lose { color: var(--lose); }
.end-title.draw { color: var(--draw); }
.end-sub { font-size: var(--f-sm); color: var(--muted); word-break: keep-all; }

.hp-result-box {
  display: flex; gap: 0;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  width: 100%; max-width: 280px;
}
.hp-result-item { padding: clamp(10px,2.5vw,14px) clamp(16px,4vw,24px); text-align: center; flex: 1; }
.hp-result-item + .hp-result-item { border-left: 1px solid var(--border); }
.hri-label {
  font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs);
  color: var(--muted); margin-bottom: 4px; letter-spacing: 1px;
}
.hri-val { font-size: clamp(22px,6vw,28px); font-weight: 700; color: #fff; font-family: 'JetBrains Mono', monospace; }

.series-disp {
  display: flex; align-items: center; gap: var(--sp-md);
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: clamp(10px,2.5vw,14px) clamp(20px,5vw,28px);
}
.sd-side { text-align: center; }
.sd-num   { font-family: 'JetBrains Mono', monospace; font-size: clamp(28px,8vw,36px); font-weight: 700; color: #fff; }
.sd-label { font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs); color: var(--muted); }
.sd-sep   { font-family: 'JetBrains Mono', monospace; font-size: clamp(16px,4vw,20px); color: var(--border); }

.btn-row { display: flex; gap: var(--sp-xs); flex-wrap: wrap; justify-content: center; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ════════════════════════════════════════
   MEDIA QUERIES
════════════════════════════════════════ */
@media (max-width: 360px) {
  .char-grid { grid-template-columns: repeat(3, 1fr); gap: 4px; }
  .char-card { padding: 6px 4px; }
  .preview-vs { gap: 6px; }
  .prev-card { padding: 10px 6px; }
  .fighters { gap: 6px; }
  .ft-chips { gap: 3px; }
  .chip { font-size: 9px; padding: 1px 3px; }
  .rps-row { gap: 4px; }
}

@media (min-width: 480px) {
  .screen { padding: 24px 24px 80px; }
}
</style>
</head>
<body>

<!-- ════ START ════ -->
<div class="screen" id="screen-start">
<div class="end-wrap">
  <div class="start-emoji">✌️✊🖐️</div>
  <div class="start-label">QA Prototype v0.1</div>
  <div class="start-title">가위바위보</div>
  <div class="diff-list">
    <button class="diff-btn easy" onclick="selectDiff('easy')">
      <div class="diff-name">🟢 쉬움</div>
      <div class="diff-desc">AI가 완전 랜덤으로 선택합니다</div>
    </button>
    <button class="diff-btn normal" onclick="selectDiff('normal')">
      <div class="diff-name">🟡 중간</div>
      <div class="diff-desc">최근 패턴을 일부 참고합니다</div>
    </button>
    <button class="diff-btn hard" onclick="selectDiff('hard')">
      <div class="diff-name">🔴 어려움</div>
      <div class="diff-desc">전체 히스토리를 분석합니다</div>
    </button>
  </div>
</div>
</div>

<!-- ════ CHAR SELECT ════ -->
<div class="screen" id="screen-char-select" hidden>
  <div class="page-nav">
    <div class="nav-label">캐릭터 선택 · 게임 <span id="cs-gnum">1</span>/3</div>
    <div class="series-badge" id="cs-badge"></div>
  </div>
  <div id="char-grid"></div>
</div>

<!-- ════ PREVIEW ════ -->
<div class="screen" id="screen-preview" hidden>
  <div class="page-nav">
    <div class="nav-label">대전 준비 · 게임 <span id="pv-gnum">1</span>/3</div>
    <div class="series-badge" id="pv-badge"></div>
  </div>
  <div class="preview-vs">
    <div class="prev-card me">
      <div class="prev-emoji" id="pv-p-emoji"></div>
      <div class="prev-grade" id="pv-p-grade"></div>
      <div class="prev-name"  id="pv-p-name"></div>
      <div class="prev-hp"   id="pv-p-hp"></div>
      <div class="prev-stats" id="pv-p-stats"></div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="prev-card">
      <div class="prev-emoji" id="pv-a-emoji"></div>
      <div class="prev-grade" id="pv-a-grade"></div>
      <div class="prev-name"  id="pv-a-name"></div>
      <div class="prev-hp"   id="pv-a-hp"></div>
      <div class="prev-stats" id="pv-a-stats"></div>
    </div>
  </div>
  <div class="preview-footer">
    <button class="btn primary" onclick="startBattle()" style="font-size:15px;padding:13px 36px;">⚔️ 대전 시작</button>
  </div>
</div>

<!-- ════ BATTLE ════ -->
<div class="screen" id="screen-battle" hidden>
  <div class="battle-top">
    <div class="nav-label">BATTLE</div>
    <div class="series-badge" id="bt-badge"></div>
    <div class="turn-pill">턴 <span id="bt-turn">1</span> / 10</div>
  </div>

  <div class="fighters">
    <div class="fighter me">
      <div class="ft-head">
        <span id="bt-p-emoji" class="ft-emoji"></span>
        <div>
          <div class="ft-name"  id="bt-p-name"></div>
          <div class="ft-grade" id="bt-p-grade"></div>
        </div>
      </div>
      <div class="hp-row">
        <div class="hp-label-row"><span>HP</span><span id="bt-p-hp-txt"></span></div>
        <div class="hp-bar"><div class="hp-fill" id="bt-p-hp-bar"></div></div>
      </div>
      <div class="ft-chips">
        <span class="chip sc" id="bt-p-sc"></span>
        <span class="chip rk" id="bt-p-rk"></span>
        <span class="chip pp" id="bt-p-pp"></span>
      </div>
    </div>
    <div class="fighter">
      <div class="ft-head">
        <span id="bt-a-emoji" class="ft-emoji"></span>
        <div>
          <div class="ft-name"  id="bt-a-name"></div>
          <div class="ft-grade" id="bt-a-grade"></div>
        </div>
      </div>
      <div class="hp-row">
        <div class="hp-label-row"><span>HP</span><span id="bt-a-hp-txt"></span></div>
        <div class="hp-bar"><div class="hp-fill" id="bt-a-hp-bar"></div></div>
      </div>
      <div class="ft-chips">
        <span class="chip sc" id="bt-a-sc"></span>
        <span class="chip rk" id="bt-a-rk"></span>
        <span class="chip pp" id="bt-a-pp"></span>
      </div>
    </div>
  </div>

  <div class="last-result">
    <div class="result-msg idle" id="bt-result">패를 선택하세요</div>
  </div>

  <div class="rps-row">
    <button class="rps-btn sc" onclick="playRound('scissors')">
      <span class="rps-icon">✌️</span>
      <span class="rps-label">가위</span>
      <span class="rps-atk" id="btn-sc">ATK 0</span>
    </button>
    <button class="rps-btn rk" onclick="playRound('rock')">
      <span class="rps-icon">✊</span>
      <span class="rps-label">바위</span>
      <span class="rps-atk" id="btn-rk">ATK 0</span>
    </button>
    <button class="rps-btn pp" onclick="playRound('paper')">
      <span class="rps-icon">🖐️</span>
      <span class="rps-label">보</span>
      <span class="rps-atk" id="btn-pp">ATK 0</span>
    </button>
  </div>

  <div class="log-box">
    <div class="log-head">전투 기록</div>
    <div id="log-body"><div class="log-row" style="color:var(--muted)">— 아직 기록 없음 —</div></div>
  </div>
</div>

<!-- ════ GAME END ════ -->
<div class="screen" id="screen-game-end" hidden>
<div class="end-wrap">
  <div class="end-icon"  id="ge-icon"></div>
  <div class="end-label">GAME <span id="ge-gnum"></span> / 3</div>
  <div class="end-title" id="ge-title"></div>
  <div class="end-sub"   id="ge-sub"></div>
  <div class="hp-result-box">
    <div class="hp-result-item">
      <div class="hri-label">나의 남은 HP</div>
      <div class="hri-val" id="ge-php"></div>
    </div>
    <div class="hp-result-item">
      <div class="hri-label">AI 남은 HP</div>
      <div class="hri-val" id="ge-ahp"></div>
    </div>
  </div>
  <div class="series-disp">
    <div class="sd-side"><div class="sd-num" id="ge-pscore"></div><div class="sd-label">나</div></div>
    <div class="sd-sep">—</div>
    <div class="sd-side"><div class="sd-num" id="ge-ascore"></div><div class="sd-label">AI</div></div>
  </div>
  <div class="btn-row" id="ge-btns"></div>
</div>
</div>

<!-- ════ SERIES END ════ -->
<div class="screen" id="screen-series-end" hidden>
<div class="end-wrap">
  <div class="end-icon"  id="se-icon"></div>
  <div class="end-label">SERIES RESULT</div>
  <div class="end-title" id="se-title"></div>
  <div class="end-sub"   id="se-sub"></div>
  <div class="series-disp">
    <div class="sd-side"><div class="sd-num" id="se-pscore"></div><div class="sd-label">나</div></div>
    <div class="sd-sep">—</div>
    <div class="sd-side"><div class="sd-num" id="se-ascore"></div><div class="sd-label">AI</div></div>
  </div>
  <div class="btn-row">
    <button class="btn primary" onclick="resetGame()">🔄 처음부터</button>
  </div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════

const CHARS = {
  c1:{ id:'c1', name:'하율',  grade:'C', hp:20, scissors:2, rock:1, paper:1, emoji:'🧒🏻', desc:'가위 강 / 바위·보 약' },
  c2:{ id:'c2', name:'서준',  grade:'C', hp:20, scissors:1, rock:2, paper:1, emoji:'👦🏻', desc:'바위 강 / 가위·보 약' },
  c3:{ id:'c3', name:'지아',  grade:'C', hp:20, scissors:1, rock:1, paper:2, emoji:'👧🏻', desc:'보 강 / 가위·바위 약' },
  b1:{ id:'b1', name:'준희',  grade:'B', hp:26, scissors:3, rock:2, paper:1, emoji:'🧑🏻‍🦱', desc:'가위 강 / 바위 중 / 보 약' },
  b2:{ id:'b2', name:'수진',  grade:'B', hp:26, scissors:1, rock:3, paper:2, emoji:'👩🏻', desc:'바위 강 / 보 중 / 가위 약' },
  b3:{ id:'b3', name:'혜정',  grade:'B', hp:26, scissors:2, rock:1, paper:3, emoji:'👱🏻‍♀️', desc:'보 강 / 가위 중 / 바위 약' },
  a1:{ id:'a1', name:'철수',  grade:'A', hp:32, scissors:4, rock:3, paper:2, emoji:'👨🏻', desc:'가위 강 / 바위 중 / 보 약' },
  a2:{ id:'a2', name:'영희',  grade:'A', hp:32, scissors:2, rock:4, paper:3, emoji:'👩🏻‍🦱', desc:'바위 강 / 보 중 / 가위 약' },
  a3:{ id:'a3', name:'민수',  grade:'A', hp:32, scissors:3, rock:2, paper:4, emoji:'🧔🏻‍♂️', desc:'보 강 / 가위 중 / 바위 약' },
  s1:{ id:'s1', name:'용남',  grade:'S', hp:38, scissors:5, rock:4, paper:3, emoji:'👴🏻', desc:'가위 강 / 바위 중 / 보 약' },
  s2:{ id:'s2', name:'춘삼',  grade:'S', hp:38, scissors:3, rock:5, paper:4, emoji:'🧓🏻', desc:'바위 강 / 보 중 / 가위 약' },
  s3:{ id:'s3', name:'순자',  grade:'S', hp:38, scissors:4, rock:3, paper:5, emoji:'👵🏻', desc:'보 강 / 가위 중 / 바위 약' },
};

const GRADE_ORDER = ['C','B','A','S'];
const GRADE_IDS   = { C:['c1','c2','c3'], B:['b1','b2','b3'], A:['a1','a2','a3'], S:['s1','s2','s3'] };
const GRADE_COL   = { C:'var(--c)', B:'var(--b)', A:'var(--a)', S:'var(--s)' };
const GRADE_INFO  = { C:{total:4,hp:20}, B:{total:6,hp:26}, A:{total:9,hp:32},  S:{total:12,hp:38} };

const BEATS    = { scissors:'paper', rock:'scissors', paper:'rock' };
const BEATS_BY = { scissors:'rock',  rock:'paper',    paper:'scissors' }; // what beats this move
const MV_EMOJI = { scissors:'✌️', rock:'✊', paper:'🖐️' };
const MV_KR    = { scissors:'가위', rock:'바위', paper:'보' };

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════

let G = {
  diff: null,
  pChar: null, aChar: null,
  pHP: 0, aHP: 0,
  pMaxHP: 0, aMaxHP: 0,
  turn: 1,
  history: [],
  score: { p:0, a:0 },
  gameNum: 1,
  active: false,
};

// ═══════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.hidden = true);
  document.getElementById('screen-' + id).hidden = false;
}

function badge() {
  const p = Math.min(2, G.score.p), a = Math.min(2, G.score.a);
  return `<span class="sb-win">${'●'.repeat(p)}${'○'.repeat(2-p)}</span>`
       + ` 나 | AI `
       + `<span class="sb-lose">${'●'.repeat(a)}${'○'.repeat(2-a)}</span>`;
}

function gradeSpan(g) {
  return `<span style="color:${GRADE_COL[g]};font-family:'JetBrains Mono',monospace;font-weight:700">${g}등급</span>`;
}

function statStr(c) {
  return [
    `<span class="prev-stat">✌️ 가위 <b>${c.scissors}</b></span>`,
    `<span class="prev-stat">✊ 바위 <b>${c.rock}</b></span>`,
    `<span class="prev-stat">🖐️ 보 &nbsp;<b>${c.paper}</b></span>`,
  ].join('');
}

function setRpsDisabled(d) {
  document.querySelectorAll('.rps-btn').forEach(b => b.disabled = d);
}

// ═══════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════

function selectDiff(d) {
  G.diff = d;
  renderCharSelect();
  show('char-select');
}

// ═══════════════════════════════════════════════════════
// CHAR SELECT
// ═══════════════════════════════════════════════════════

function renderCharSelect() {
  document.getElementById('cs-gnum').textContent = G.gameNum;
  document.getElementById('cs-badge').innerHTML  = badge();

  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';

  for (const gr of GRADE_ORDER) {
    const col  = GRADE_COL[gr];
    const info = GRADE_INFO[gr];
    const sec  = document.createElement('div');
    sec.className = 'grade-section';
    sec.innerHTML = `
      <div class="grade-header">
        <div class="grade-tag" style="color:${col}">${gr}</div>
        <div class="grade-meta">HP ${info.hp} &nbsp;|&nbsp; 합계 ${info.total}</div>
      </div>
      <div class="char-grid" id="cg-${gr}"></div>
    `;
    grid.appendChild(sec);

    const cg = sec.querySelector(`#cg-${gr}`);
    for (const id of GRADE_IDS[gr]) {
      const c = CHARS[id];
      const card = document.createElement('div');
      card.className = 'char-card';
      card.onclick = () => pickChar(id);
      card.innerHTML = `
        <div class="cc-emoji">${c.emoji}</div>
        <div class="cc-name">${c.name}</div>
        ${miniStat('✌️가위', c.scissors, 'sc-bar')}
        ${miniStat('✊바위', c.rock,     'rk-bar')}
        ${miniStat('🖐️보',  c.paper,    'pp-bar')}
      `;
      cg.appendChild(card);
    }
  }
}

function miniStat(label, val, cls) {
  const pct = (val / 5) * 100;
  return `
    <div class="mini-stat">
      <div class="ms-label"><span>${label}</span><span>${val}</span></div>
      <div class="ms-bar"><div class="ms-fill ${cls}" style="width:${pct}%"></div></div>
    </div>`;
}

function pickChar(id) {
  G.pChar = CHARS[id];
  const aiGradePool = {
    S: ['S','A'],
    A: ['S','A','B'],
    B: ['A','B','C'],
    C: ['B','C'],
  }[G.pChar.grade];
  const aiPool = Object.values(CHARS).filter(c => aiGradePool.includes(c.grade));
  G.aChar = aiPool[Math.floor(Math.random() * aiPool.length)];
  renderPreview();
  show('preview');
}

// ═══════════════════════════════════════════════════════
// PREVIEW
// ═══════════════════════════════════════════════════════

function renderPreview() {
  const { pChar, aChar, gameNum } = G;
  document.getElementById('pv-gnum').textContent = gameNum;
  document.getElementById('pv-badge').innerHTML  = badge();

  document.getElementById('pv-p-emoji').textContent = pChar.emoji;
  document.getElementById('pv-p-grade').innerHTML   = gradeSpan(pChar.grade);
  document.getElementById('pv-p-name').textContent  = pChar.name;
  document.getElementById('pv-p-hp').textContent    = `HP ${pChar.hp}`;
  document.getElementById('pv-p-stats').innerHTML   = statStr(pChar);

  document.getElementById('pv-a-emoji').textContent = aChar.emoji;
  document.getElementById('pv-a-grade').innerHTML   = gradeSpan(aChar.grade);
  document.getElementById('pv-a-name').textContent  = aChar.name;
  document.getElementById('pv-a-hp').textContent    = `HP ${aChar.hp}`;
  document.getElementById('pv-a-stats').innerHTML   = statStr(aChar);
}

// ═══════════════════════════════════════════════════════
// BATTLE START
// ═══════════════════════════════════════════════════════

function startBattle() {
  G.pHP = G.pMaxHP = G.pChar.hp;
  G.aHP = G.aMaxHP = G.aChar.hp;
  G.turn    = 1;
  G.history = [];
  G.active  = true;
  renderBattle();
  show('battle');
}

function renderBattle() {
  const { pChar, aChar } = G;
  document.getElementById('bt-badge').innerHTML = badge();
  document.getElementById('bt-turn').textContent = G.turn;

  // Left fighter (player)
  document.getElementById('bt-p-emoji').textContent = pChar.emoji;
  document.getElementById('bt-p-name').textContent  = pChar.name;
  document.getElementById('bt-p-grade').innerHTML   = gradeSpan(pChar.grade);
  document.getElementById('bt-p-sc').textContent    = `✌️${pChar.scissors}`;
  document.getElementById('bt-p-rk').textContent    = `✊${pChar.rock}`;
  document.getElementById('bt-p-pp').textContent    = `🖐️${pChar.paper}`;

  // Right fighter (AI)
  document.getElementById('bt-a-emoji').textContent = aChar.emoji;
  document.getElementById('bt-a-name').textContent  = aChar.name;
  document.getElementById('bt-a-grade').innerHTML   = gradeSpan(aChar.grade);
  document.getElementById('bt-a-sc').textContent    = `✌️${aChar.scissors}`;
  document.getElementById('bt-a-rk').textContent    = `✊${aChar.rock}`;
  document.getElementById('bt-a-pp').textContent    = `🖐️${aChar.paper}`;

  // ATK labels on buttons
  document.getElementById('btn-sc').textContent = `ATK ${pChar.scissors}`;
  document.getElementById('btn-rk').textContent = `ATK ${pChar.rock}`;
  document.getElementById('btn-pp').textContent = `ATK ${pChar.paper}`;

  // Result + log
  document.getElementById('bt-result').textContent = '패를 선택하세요';
  document.getElementById('bt-result').className   = 'result-msg idle';
  document.getElementById('log-body').innerHTML    = '<div class="log-row" style="color:var(--muted)">— 아직 기록 없음 —</div>';

  updateHP();
  setRpsDisabled(false);
}

function updateHP() {
  const setBar = (barId, txtId, cur, max) => {
    const pct = Math.max(0, (cur / max) * 100);
    document.getElementById(txtId).textContent = `${Math.max(0,cur)} / ${max}`;
    const bar = document.getElementById(barId);
    bar.style.width = pct + '%';
    bar.className = 'hp-fill' + (pct <= 25 ? ' low' : pct <= 50 ? ' med' : '');
  };
  setBar('bt-p-hp-bar','bt-p-hp-txt', G.pHP, G.pMaxHP);
  setBar('bt-a-hp-bar','bt-a-hp-txt', G.aHP, G.aMaxHP);
}

// ═══════════════════════════════════════════════════════
// AI LOGIC
// ═══════════════════════════════════════════════════════

function aiPick() {
  const moves = ['scissors','rock','paper'];
  const rnd   = () => moves[Math.floor(Math.random() * 3)];
  const { diff, aChar, pChar, history } = G;

  if (diff === 'easy') return rnd();

  if (diff === 'normal') {
    // Predict player's likely move
    let pred;
    const len = history.length;
    if (len >= 2 && history[len-1].pm === history[len-2].pm) {
      pred = history[len-1].pm; // player repeating → counter it
    } else if (len >= 1 && Math.random() < 0.4) {
      pred = history[len-1].pm;
    } else {
      // guess player plays highest-stat move
      pred = ['scissors','rock','paper'].reduce((a,b) => pChar[a]>=pChar[b]?a:b);
    }
    return Math.random() < 0.6 ? BEATS_BY[pred] : rnd();
  }

  if (diff === 'hard') {
    // Frequency analysis (seed 1 to avoid cold-start bias)
    const freq = { scissors:1, rock:1, paper:1 };
    history.forEach(h => freq[h.pm] += 2);
    const pred = Object.keys(freq).reduce((a,b) => freq[a]>=freq[b]?a:b);
    const counter  = BEATS_BY[pred];
    const bestAtk  = ['scissors','rock','paper'].reduce((a,b) => aChar[a]>=aChar[b]?a:b);
    return Math.random() < 0.65 ? counter : bestAtk;
  }

  return rnd();
}

// ═══════════════════════════════════════════════════════
// PLAY ROUND
// ═══════════════════════════════════════════════════════

function playRound(pm) {
  if (!G.active) return;
  setRpsDisabled(true);

  const am = aiPick();
  let result, pdmg = 0, admg = 0;

  if (pm === am) {
    result = 'draw';
  } else if (BEATS[pm] === am) {
    result = 'win';
    admg   = G.pChar[pm];
    G.aHP  = Math.max(0, G.aHP - admg);
  } else {
    result = 'lose';
    pdmg   = G.aChar[am];
    G.pHP  = Math.max(0, G.pHP - pdmg);
  }

  const turnNum = G.turn;
  G.history.push({ pm, am, result, pdmg, admg, turn: turnNum });
  G.turn++;

  // Update HP + turn counter
  updateHP();
  document.getElementById('bt-turn').textContent = G.turn;

  // Result message
  const el = document.getElementById('bt-result');
  const msg = result === 'win'
    ? `${MV_EMOJI[pm]}${MV_KR[pm]} vs ${MV_EMOJI[am]}${MV_KR[am]} — 승리! AI -${admg}HP`
    : result === 'lose'
    ? `${MV_EMOJI[pm]}${MV_KR[pm]} vs ${MV_EMOJI[am]}${MV_KR[am]} — 패배! 나 -${pdmg}HP`
    : `${MV_EMOJI[pm]}${MV_KR[pm]} vs ${MV_EMOJI[am]}${MV_KR[am]} — 비겼습니다`;
  el.textContent = msg;
  el.className   = `result-msg ${result}`;

  // Battle log (newest first)
  const logEl = document.getElementById('log-body');
  logEl.innerHTML = '';
  for (const h of [...G.history].reverse()) {
    const cls  = h.result === 'win' ? 'log-win' : h.result === 'lose' ? 'log-lose' : 'log-draw';
    const info = h.result === 'win' ? `승리 AI-${h.admg}HP`
               : h.result === 'lose' ? `패배 나-${h.pdmg}HP` : '무';
    const div = document.createElement('div');
    div.className = 'log-row';
    div.innerHTML = `T${h.turn}: ${MV_EMOJI[h.pm]}${MV_KR[h.pm]} vs ${MV_EMOJI[h.am]}${MV_KR[h.am]} <span class="${cls}">→ ${info}</span>`;
    logEl.appendChild(div);
  }

  // Check end conditions with a brief visual pause
  setTimeout(() => {
    const hpEnd   = G.pHP <= 0 || G.aHP <= 0;
    const turnEnd = G.turn > 10;
    if (hpEnd || turnEnd) { G.active = false; endBattle(turnEnd && !hpEnd); }
    else setRpsDisabled(false);
  }, 600);
}

// ═══════════════════════════════════════════════════════
// BATTLE / SERIES END
// ═══════════════════════════════════════════════════════

function endBattle(byTurn) {
  const { pHP, aHP } = G;

  let winner;
  if (pHP <= 0 && aHP <= 0) winner = 'draw';
  else if (aHP <= 0) winner = 'p';
  else if (pHP <= 0) winner = 'a';
  else winner = pHP > aHP ? 'p' : aHP > pHP ? 'a' : 'draw'; // turn limit

  if (winner === 'p') G.score.p++;
  else if (winner === 'a') G.score.a++;

  // Check series winner BEFORE incrementing gameNum
  let seriesWinner = null;
  if      (G.score.p >= 2) seriesWinner = 'p';
  else if (G.score.a >= 2) seriesWinner = 'a';
  else if (G.gameNum >= 3) {
    seriesWinner = G.score.p > G.score.a ? 'p'
                 : G.score.a > G.score.p ? 'a' : 'draw';
  }

  const gameJustPlayed = G.gameNum;
  G.gameNum++;

  renderGameEnd(winner, seriesWinner, gameJustPlayed, byTurn);
  show('game-end');
}

function renderGameEnd(winner, seriesWinner, gn, byTurn) {
  const icons  = { p:'🎉', a:'😢', draw:'🤝' };
  const titles = { p:'승리', a:'패배', draw:'무승부' };
  const subs   = {
    p: `이 게임에서 이겼습니다${byTurn?' (턴 제한 판정)':''}`,
    a: `이 게임에서 졌습니다${byTurn?' (턴 제한 판정)':''}`,
    draw: `무승부${byTurn?' (턴 제한 동점)':''}`,
  };
  const cls = { p:'win', a:'lose', draw:'draw' };

  document.getElementById('ge-icon').textContent  = icons[winner];
  document.getElementById('ge-gnum').textContent  = gn;
  document.getElementById('ge-title').textContent = titles[winner];
  document.getElementById('ge-title').className   = `end-title ${cls[winner]}`;
  document.getElementById('ge-sub').textContent   = subs[winner];
  document.getElementById('ge-php').textContent   = Math.max(0, G.pHP);
  document.getElementById('ge-ahp').textContent   = Math.max(0, G.aHP);
  document.getElementById('ge-pscore').textContent = G.score.p;
  document.getElementById('ge-ascore').textContent = G.score.a;

  const row = document.getElementById('ge-btns');
  row.innerHTML = '';

  if (seriesWinner) {
    row.innerHTML = `<button class="btn primary" onclick="showSeriesEnd('${seriesWinner}')">결과 보기 →</button>`;
  } else {
    row.innerHTML = `
      <button class="btn primary" onclick="nextGame()">다음 게임 (${G.gameNum}/3) →</button>
      <button class="btn" onclick="resetGame()">처음으로</button>
    `;
  }
}

function showSeriesEnd(w) {
  const icons  = { p:'🏆', a:'💀', draw:'🤝' };
  const titles = { p:'최종 승리!', a:'최종 패배', draw:'최종 무승부' };
  const subs   = {
    p:'3판 2선승 시리즈에서 승리했습니다',
    a:'3판 2선승 시리즈에서 패배했습니다',
    draw:'시리즈가 무승부로 끝났습니다',
  };
  const cls = { p:'win', a:'lose', draw:'draw' };

  document.getElementById('se-icon').textContent  = icons[w];
  document.getElementById('se-title').textContent = titles[w];
  document.getElementById('se-title').className   = `end-title ${cls[w]}`;
  document.getElementById('se-sub').textContent   = subs[w];
  document.getElementById('se-pscore').textContent = G.score.p;
  document.getElementById('se-ascore').textContent = G.score.a;
  show('series-end');
}

function nextGame() {
  renderCharSelect();
  show('char-select');
}

function resetGame() {
  G = { diff:null, pChar:null, aChar:null, pHP:0, aHP:0, pMaxHP:0, aMaxHP:0,
        turn:1, history:[], score:{p:0,a:0}, gameNum:1, active:false };
  show('start');
}

// ─── INIT ───
show('start');
</script>
